name: Afterglow TV CI/CD Workflow

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-verify:
    name: Verify Web & Server Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check & Linter
        run: npm run lint

      - name: Build Web Application & Express Server
        run: npm run build
        env:
          NODE_ENV: production

      - name: Clean Build Workspace Checks
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: Dist build directory has not been created."
            exit 1
          fi
          if [ ! -f "dist/server.cjs" ]; then
            echo "Error: Server production build dist/server.cjs is missing."
            exit 1
          fi
          echo "Production assets and server are fully built and verified."

  build-android-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest
    needs: build-and-verify # Only compile APK if we verified code compatibility first

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Java 17 is standard and fully compatible with modern Gradle releases

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Sync Web Assets to Android Shell
        run: npx cap sync

      - name: Compile Android Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: afterglow-tv-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

